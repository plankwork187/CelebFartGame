<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; }
#game { font-family: var(--font-sans, sans-serif); width: 100%; position: relative; }
#mode-bar { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
#mode-bar span { font-size: 13px; color: var(--color-text-secondary, #888); font-weight: 500; margin-right: 4px; }
.mode-btn { padding: 6px 16px; font-size: 13px; font-weight: 500; border-radius: 8px; border: 0.5px solid #ccc; background: var(--color-background-primary, #fff); color: var(--color-text-primary, #111); cursor: pointer; transition: background 0.15s; }
.mode-btn.active { background: #E75480; color: #fff; border-color: #E75480; }
#scene { width: 100%; height: 340px; background: #a8d8a8; position: relative; overflow: hidden; border-radius: 12px; border: 0.5px solid #ddd; }
#sky { position: absolute; top: 0; left: 0; right: 0; height: 55%; background: #87CEEB; }
#ground { position: absolute; bottom: 0; left: 0; right: 0; height: 45%; background: #5a9a3a; }
#path { position: absolute; bottom: 55px; left: 0; right: 0; height: 28px; background: #c8b89a; border-top: 2px solid #a89070; border-bottom: 2px solid #a89070; }

/* bench behind player */
#bench-img {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  width: 305px;
  height: auto;
  pointer-events: none;
  z-index: 3;
}

/* player sitting behind bench visually */
#player-wrap {
  position: absolute;
  bottom: 44px;
  left: 50%;
  transform: translateX(-50%);
  width: 143px;
  height: auto;
  transform-origin: bottom center;
  z-index: 2;
  transition: none;
}
#player-img {
  width: 100px;
  height: auto;
  pointer-events: none;
  display: block;
}

.cloud { position: absolute; border-radius: 50%; pointer-events: none; display: flex; align-items: center; justify-content: center; font-size: 13px; z-index: 5; }
.npc { position: absolute; bottom: 132px; width: 56px; height: 112px; z-index: 1; }
.npc-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 36px; height: 36px; border-radius: 50%; }
.npc-body { position: absolute; top: 32px; left: 50%; transform: translateX(-50%); width: 40px; height: 48px; border-radius: 6px; }
.npc-legs { position: absolute; top: 76px; left: 50%; transform: translateX(-50%); width: 40px; display: flex; gap: 6px; height: 36px; }
.npc-leg { flex: 1; border-radius: 4px 4px 8px 8px; }
.npc-react { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 14px; pointer-events: none; }

/* NPC speech bubble */
.npc-speech {
  position: absolute;
  top: -46px;
  left: 50%;
  transform: translateX(-50%);
  background: #fff;
  border: 1.5px solid #ccc;
  border-radius: 10px;
  padding: 4px 7px;
  font-size: 9.5px;
  font-weight: 600;
  color: #333;
  white-space: nowrap;
  pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.13);
  z-index: 10;
  opacity: 0;
  transition: opacity 0.18s;
}
.npc-speech::after {
  content: '';
  position: absolute;
  bottom: -7px;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: #ccc;
}
.npc-speech.visible { opacity: 1; }

.npc-A .npc-head { background: #DEB887; }
.npc-A .npc-body { background: #228B22; }
.npc-A .npc-leg { background: #8B4513; }

.npc-C .npc-head { background: #FDBCB4; }

.npc-D .npc-head { background: #8B4513; }
.npc-D .npc-body { background: #CC4400; }

.bar-bg { background: #ddd; border-radius: 99px; height: 9px; overflow: hidden; }

#score-card { background: var(--color-background-secondary, #f5f5f5); border-radius: 8px; padding: 8px 12px; text-align: center; }
#score-label { font-size: 11px; color: var(--color-text-secondary, #888); font-weight: 500; }

#controls { display: flex; gap: 8px; margin-top: 8px; }

#controls button:active, #controls button.held { background: #E75480; color: #fff; border-color: #E75480; transform: scale(0.98); }
#status-msg { text-align: center; font-size: 12px; color: var(--color-text-secondary, #888); margin-top: 6px; min-height: 16px; font-style: italic; }
#overlay {
  display: none; position: absolute; top: 0; left: 0; right: 0; bottom: 0;

#overlay-title { font-size: 26px; font-weight: 700; color: #fff; text-align: center; }
#overlay-sub { font-size: 14px; color: rgba(255,255,255,0.85); text-align: center; max-width: 260px; line-height: 1.4; }
#overlay-score { font-size: 15px; color: rgba(255,255,255,0.75); }
#overlay-btn { padding: 10px 28px; border-radius: 8px; border: none; background: #E75480; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 4px; }
#power-label { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 500; color: var(--color-text-secondary, #888); pointer-events: none; white-space: nowrap; z-index: 7; }

#char-select{

// ── Music tracks ─────────────────────────────────────────────────────────────
// Call MUSIC.play('key') to crossfade/start, MUSIC.stop() to stop.
const MUSIC_TRACKS = {
  //  key              src                                  loop    volume
  menu:       { src: 'audio/music_menu.mp3',            loop: true,  volume: 0.5  },
  stealth:    { src: 'audio/music_stealth.mp3',         loop: true,  volume: 0.4  },
  stealthHigh:{ src: 'audio/music_stealth_tense.mp3',   loop: true,  volume: 0.45 }, // suspicion > 60
  chaos:      { src: 'audio/music_chaos.mp3',           loop: true,  volume: 0.5  },
  gameover:   { src: 'audio/music_gameover.mp3',        loop: false, volume: 0.6  },
  victory:    { src: 'audio/music_victory.mp3',         loop: false, volume: 0.6  }, // future high-score screen
};

const MUSIC = (() => {
  let current = null; // { audio, key }
  return {
    play(key) {
      const def = MUSIC_TRACKS[key];
      if (!def) return;
      if (current && current.key === key) return;
      if (current) { current.audio.pause(); current.audio.currentTime = 0; }
      const a = new Audio(def.src);
      a.loop   = def.loop;
      a.volume = def.volume;
      // Uncomment once audio files are in place:
      // a.play().catch(() => {});
      current = { audio: a, key };
    },
    stop() {
      if (!current) return;
      current.audio.pause();
      current.audio.currentTime = 0;
      current = null;
    },
    setVolume(v) {
      if (current) current.audio.volume = Math.max(0, Math.min(1, v));
    },
  };
})();

    if (!def) return;
    const src = def.srcs[Math.floor(Math.random() * def.srcs.length)];

    // Uncomment once audio files are in place:

}))();

// ── Fart SFX helper — picks tier by power ────────────────────────────────────
function playFartSFX(power, involuntary = false) {
  if (involuntary)       { SFX.play('fart_involuntary'); return; }
  if (power > 0.75)      SFX.play('fart_mega');
  else if (power > 0.5)  SFX.play('fart_strong');
  else if (power > 0.25) SFX.play('fart_medium');
  else                   SFX.play('fart_light');
}

let npcs = [], clouds = [];
let suspicion = 0, score = 0, gas = 40;
let gameOver = false;
let holdDir = 0, holdStart = 0, holdPower = 0;
let animId, lastTs = 0;
let npcTimer = 0, cloudTimer = 0;
let gameTime = 0;       // ms elapsed since game start — drives stealth NPC escalation
let statusClearTimer = null;
let currentFaceKey = null;
let currentLeanImg = null; // locked at lean-start

function setMode(m) {

// ── NPC / clouds ─────────────────────────────────────────────────────────────
function makeNPC() {
  const el = document.createElement('div');
  const type = NPC_COLORS[Math.floor(Math.random() * NPC_COLORS.length)];
  el.className = `npc ${type}`;
  const dir = Math.random() > 0.5 ? 1 : -1;
  const speed = (mode === 'chaos' ? 0.55 : 0.6) + Math.random() * 0.9;
  const W = getW();
  const startX = dir === 1 ? -60 : W + 60;
  el.innerHTML = '<div class="npc-head"></div><div class="npc-body"></div><div class="npc-legs"><div class="npc-leg"></div><div class="npc-leg"></div></div><div class="npc-react"></div><div class="npc-speech"></div>';
  el.style.left = startX + 'px';
  scene.appendChild(el);
  return { el, x: startX, dir, speed, reacted: false };
}

function spawnCloud(dir, power) {
  const el = document.createElement('div');
  el.className = 'cloud';
  const radius = 18 + power * 28;
  el.style.width = el.style.height = Math.round(radius * 2) + 'px';
  el.style.background = power > 0.6 ? 'rgba(180,220,80,0.55)' : 'rgba(200,230,120,0.38)';
  el.style.border = '1px solid rgba(140,180,40,0.4)';
  const playerRect = playerWrap.getBoundingClientRect();
const sceneRect = scene.getBoundingClientRect();

const playerCenterX =
  playerRect.left - sceneRect.left + playerRect.width / 2;

const baseX = playerCenterX - dir * 50;
  el.style.left = (baseX - radius) + 'px';
  el.style.bottom = '90px';
  el.style.fontSize = Math.round(10 + power * 8) + 'px';
  el.textContent = power > 0.7 ? '💨' : '';
  scene.appendChild(el);
  clouds.push({ el, x: baseX, radius, drift: -dir, power, age: 0, maxAge: 1800 + power * 1200 });
}

function checkCloudNPC(cloud) {
  npcs.forEach(n => {
    if (n.reacted) return;
    if (Math.abs(n.x - cloud.x) < cloud.radius + 14) {
      n.reacted = true;
      const reactEl  = n.el.querySelector('.npc-react');
      const speechEl = n.el.querySelector('.npc-speech');

      // Pick speech text and reaction emoji by power + mode
      let speechPool, emoji;
      if (mode === 'chaos') {
        speechPool = DIALOGUE.npc_chaos;
        emoji = '😵';
      } else if (cloud.power > 0.65) {
        speechPool = DIALOGUE.npc_strong;
        emoji = '🤢';
      } else if (cloud.power > 0.35) {
        speechPool = DIALOGUE.npc_medium;
        emoji = '😦';
      } else {
        speechPool = DIALOGUE.npc_mild;
        emoji = '❓';
      }

      reactEl.textContent = emoji;
      speechEl.textContent = randFrom(speechPool);
      speechEl.classList.add('visible');

      if (mode === 'chaos') {
        const pts = Math.round(10 + cloud.power * 20);
        score += pts;
        scoreVal.textContent = score;
        setFace('sniffed');
        setStatus(randFrom(DIALOGUE.hit), 1500);
      } else {
        suspicion = Math.min(100, suspicion + 18 + cloud.power * 25);
        if (suspicion >= 100) { doGameOver('suspicion'); return; }
        setFace('ohno', true);
        setStatus(randFrom(DIALOGUE.suspicious), 2000);
      }

      setTimeout(() => {
        reactEl.textContent = '';
        speechEl.textContent = '';
        speechEl.classList.remove('visible');
        n.reacted = false;
      }, 2400);
    }
  });
}

// ── Hold mechanics ────────────────────────────────────────────────────────────
function startHold(dir) {
  if (gameOver) return;
  if (mode === 'stealth' && gas <= 1) return;
  holdDir = dir;
  holdStart = performance.now();
  powerRing.style.opacity = '1';
  currentLeanImg = Math.random() < 0.5 ? 'lean1' : 'lean2';
  setFace(currentLeanImg, true);
  setStatus(randFrom(DIALOGUE.leaning), 0);
}

function stopHold() {
  if (holdDir === 0) return;
  const releasedPower = holdPower; // capture before reset
  holdDir = 0;
  holdPower = 0;
  playerWrap.className = '';
  powerRing.style.opacity = '0';
  powerArc.setAttribute('stroke-dasharray', '0 ' + CIRC);
  powerLabel.textContent = '';
  currentLeanImg = null;
  // Brief relief
  setFace('relieved', true);
  setStatus(randFrom(DIALOGUE.release), 2200);
  setTimeout(() => {
    if (!gameOver && holdDir === 0) {
      currentFaceKey = null; // allow idle to update
    }
  }, 900);

  // ── Stealth scoring ───────────────────────────────────────────────────────
  // Points for successfully releasing gas without getting caught.
  // Base = power × 15, plus a bonus for nearby NPCs (risky = rewarding).
  if (mode === 'stealth') {
    const W = getW();
    const playerX = W / 2;
    const nearbyCount = npcs.filter(n => Math.abs(n.x - playerX) < W * 0.35).length;
    const nearbyBonus = nearbyCount * 8;
    const pts = Math.round(releasedPower * 15 + nearbyBonus);
    if (pts > 0) {
      score += pts;
      scoreVal.textContent = score;
      SFX.play('score');
    }
  }
}

function updateHold(dt) {
  if (holdDir === 0) return;
  if (mode === 'stealth' && gas <= 0) { stopHold(); return; }

  const elapsed = performance.now() - holdStart;
  holdPower = Math.min(1, elapsed / 3000);
  const arcLen = holdPower * CIRC;
  powerArc.setAttribute('stroke-dasharray', arcLen.toFixed(1) + ' ' + (CIRC - arcLen).toFixed(1));
  powerArc.setAttribute('stroke', holdPower > 0.7 ? '#cc2200' : holdPower > 0.4 ? '#e8a020' : '#E75480');
  powerLabel.textContent = holdPower > 0.7 ? 'MAX' : holdPower > 0.4 ? 'strong' : 'light';

  // Player lean visual — use locked image, upgrade to extreme if power high
  if (holdPower > 0.75) {
    playerWrap.className = holdDir === -1 ? 'lean-extreme-left' : 'lean-extreme-right';
    setFace('lean_ext', false); // only if not already
  } else {
    playerWrap.className = holdDir === -1 ? 'lean-left' : 'lean-right';
    if (currentFaceKey !== currentLeanImg) setFace(currentLeanImg, true);
  }

  // Gas drain: exponential curve — longer hold = much faster drain
  // At power=0: ~0.004/ms. At power=1: ~0.018/ms (4.5× faster)
  if (mode === 'stealth') {
    const drainRate = 0.004 + holdPower * holdPower * 0.014;
    gas = Math.max(0, gas - dt * drainRate);
  }

  cloudTimer += dt;
  const interval = Math.max(140, 420 - holdPower * 280);
  if (cloudTimer >= interval) {
    cloudTimer = 0;
    spawnCloud(holdDir, holdPower);
  }
}

// ── Clouds, NPCs, bars ───────────────────────────────────────────────────────
function updateClouds(dt) {
  clouds = clouds.filter(c => {
    c.age += dt;
    c.x += c.drift * dt * 0.04 * (0.5 + c.power);
    c.el.style.left = (c.x - c.radius) + 'px';
    c.el.style.opacity = String(Math.max(0, 1 - (c.age / c.maxAge) ** 2));
    checkCloudNPC(c);
    if (c.age >= c.maxAge) { c.el.remove(); return false; }
    return true;
  });
}

function updateNPCs(dt) {
  npcTimer += dt;
  const W = getW();

  let spawnInterval, maxNPCs;
  if (mode === 'chaos') {
    // Chaos: busy and fast the whole time
    spawnInterval = 1400;
    maxNPCs = Math.max(5, Math.floor(W / 130));
  } else {
    // Stealth: escalate over ~2 minutes (120 000 ms)
    // t goes 0 → 1 as gameTime goes 0 → 120 s
    const t = Math.min(1, gameTime / 120000);
    // Interval: starts at 7 s, ramps down to 2.2 s
    spawnInterval = 7000 - t * 4800;
    // Max NPCs: starts at 2, ramps up to 7 (also scales with width)
    const widthBonus = Math.floor((W - 680) / 200); // 0 at 680px, +1 per 200px extra
    maxNPCs = Math.round(2 + t * 5) + Math.max(0, widthBonus);
  }

  if (npcTimer > spawnInterval && npcs.length < maxNPCs) {
    npcTimer = 0;
    npcs.push(makeNPC());
  }

  npcs = npcs.filter(n => {
    n.x += n.dir * n.speed;
    n.el.style.left = Math.round(n.x) + 'px';
    if (n.x < -100 || n.x > W + 100) { n.el.remove(); return false; }
    return true;
  });
}

function updateSuspicion(dt) {
  if (mode === 'chaos') return;
  if (suspicion > 0) suspicion = Math.max(0, suspicion - dt * 0.005);
  if (suspicion >= 100) { doGameOver('suspicion'); }
}

function updateGas(dt) {
  if (mode === 'chaos') return;
  // Fill slowly overall; crawl in the last 15% to avoid cheap accidents
  if (holdDir === 0) {
    const proximity = Math.max(0, (gas - 85) / 15); // 0 at ≤85, 1 at 100
    const rate = 0.010 * (1 - proximity * 0.82);    // slows to ~18% speed near full
    gas = Math.min(100, gas + dt * rate);
  }
  if (gas >= 100) {
    // Involuntary: big cloud but only drains ~35 units — not a full reset
    gas = Math.max(0, gas - 35);
    spawnCloud(Math.random() > 0.5 ? 1 : -1, 0.9); // slightly bigger than voluntary max
    setStatus(randFrom(DIALOGUE.involuntary), 2500);
  }
}

let idleDialogueTimer = 0;
function updateFaceIdle() {
  if (holdDir !== 0 || gameOver) return;
  if (currentFaceKey === 'relieved') return;

  if (mode === 'chaos') { setFace('chaos'); return; }

  if (suspicion > 70)      { setFace('panicking'); }
  else if (suspicion > 40) { setFace('nervous'); }
  else if (gas > 78)       { setFace('disc_high'); }
  else if (gas > 48)       { setFace('holding'); }
  else                     { setFace('relaxed'); }
}

// Periodic idle dialogue
let idleDialogTimer = 0;
function updateIdleDialogue(dt) {
  if (holdDir !== 0 || gameOver) return;
  idleDialogTimer += dt;
  if (idleDialogTimer > 4500) {
    idleDialogTimer = 0;
    if (mode === 'chaos') {
      setStatus(randFrom(DIALOGUE.chaos), 3000);
    } else if (suspicion > 50) {
      setStatus(randFrom(DIALOGUE.suspicious), 3000);
    } else {
      setStatus(randFrom(DIALOGUE.holding), 3000);
    }
  }
}

function updateBars() {
  const s = Math.round(suspicion);
  suspBar.style.width = s + '%';
  suspBar.style.background = s > 70 ? '#cc2200' : s > 40 ? '#e8a020' : '#3a9e3a';
  const g = Math.round(gas);
  gasBarEl.style.width = g + '%';
  gasBarEl.style.background = g > 75 ? '#cc2200' : g > 50 ? '#e8a020' : '#3a9e3a';
}

// ── Game over ────────────────────────────────────────────────────────────────
function doGameOver(reason) {
  if (gameOver) return;
  gameOver = true;

  // Pick a single caught image per loss type — no swapping
  let caughtKey, title, sub;
  if (reason === 'suspicion') {
    caughtKey = 'caught1';
    title = '😳 Busted!';
    sub = randFrom(DIALOGUE.caught);
  } else {
    caughtKey = 'caught2';
    title = '💨 You Lost It!';
    sub = randFrom(DIALOGUE.involuntary);
  }

  holdDir = 0; holdPower = 0;
  playerWrap.className = '';
  powerRing.style.opacity = '0';
  cancelAnimationFrame(animId);
  setFace(caughtKey, true);

  overlay.querySelector('#overlay-title').textContent = title;
  overlaySub.textContent = sub;
  overlayScore.textContent = 'Final score: ' + score;
  overlay.classList.add('show');
}

// ── Reset ────────────────────────────────────────────────────────────────────
function resetGame() {
  npcs.forEach(n => n.el.remove()); npcs = [];
  clouds.forEach(c => c.el.remove()); clouds = [];
  suspicion = 0; score = 0; gas = 40; gameOver = false;
  holdDir = 0; holdPower = 0; npcTimer = 0; cloudTimer = 0; gameTime = 0;
  lastTs = 0; currentFaceKey = null; currentLeanImg = null;
  idleDialogTimer = 0;
  playerWrap.className = '';
  powerRing.style.opacity = '0';
  powerArc.setAttribute('stroke-dasharray', '0 ' + CIRC);
  powerLabel.textContent = '';
  scoreVal.textContent = '0';
  overlay.classList.remove('show');
  setFace(mode === 'chaos' ? 'chaos' : 'relaxed', true);
  setStatus(mode === 'chaos'
    ? randFrom(DIALOGUE.chaos)
    : 'Hold a button to lean and fart — longer = more powerful!', 0);
  // Seed initial NPCs — walk in naturally from the edges
  // Stealth starts sparse; chaos starts busier
  const seedCount = mode === 'chaos' ? Math.max(3, Math.floor(getW() / 200)) : 1;
  for (let i = 0; i < seedCount; i++) {
    setTimeout(() => { if (!gameOver) npcs.push(makeNPC()); }, i * 600 + 300);
  }
  cancelAnimationFrame(animId);
  animId = requestAnimationFrame(loop);
}

// ── Loop ─────────────────────────────────────────────────────────────────────
function loop(ts) {
  if (gameOver) return;
  const dt = Math.min(ts - (lastTs || ts), 50);
  lastTs = ts;
  if (mode === 'stealth') gameTime += dt;
  updateHold(dt);
  updateClouds(dt);
  updateNPCs(dt);
  updateSuspicion(dt);
  updateGas(dt);
  updateBars();
  updateFaceIdle();
  updateIdleDialogue(dt);
  animId = requestAnimationFrame(loop);
}

// ── Controls ──────────────────────────────────────────────────────────────────
const btnLeft  = document.getElementById('btn-left');
const btnRight = document.getElementById('btn-right');

function attachBtn(btn, dir) {
  btn.addEventListener('mousedown',  e => { e.preventDefault(); btn.classList.add('held');    startHold(dir); });
  btn.addEventListener('touchstart', e => { e.preventDefault(); btn.classList.add('held');    startHold(dir); }, { passive: false });
  const up = () => { btn.classList.remove('held'); stopHold(); };
  btn.addEventListener('mouseup',    up);
  btn.addEventListener('mouseleave', up);
  btn.addEventListener('touchend',   up);
  btn.addEventListener('touchcancel',up);
}
attachBtn(btnLeft,  -1);
attachBtn(btnRight,  1);

const keys = {};
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if ((e.key==='ArrowLeft'||e.key==='a') && !keys.left)  { keys.left=true;  btnLeft.classList.add('held');  startHold(-1); }
  if ((e.key==='ArrowRight'||e.key==='d') && !keys.right){ keys.right=true; btnRight.classList.add('held'); startHold(1);  }
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'||e.key==='a')  { keys.left=false;  btnLeft.classList.remove('held');  stopHold(); }
  if (e.key==='ArrowRight'||e.key==='d') { keys.right=false; btnRight.classList.remove('held'); stopHold(); }
});

CHARACTERS.char1.body =
  document.getElementById('player-img').src;

document.getElementById('char1-preview').src =
  CHARACTERS.char1.profile;

document.getElementById('char2-preview').src =
  CHARACTERS.char2.profile;

document.getElementById('char-select').style.display =
  'flex';
</script>
</body>
</html>
